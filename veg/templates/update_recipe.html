<!DOCTYPE html>
<html>
<head>
    <title>Update Recipe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <form class="col-6 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <h2>Update Recipe</h2>
        <hr>
        {% if message %}
            <div class="alert alert-info">{{ message }}</div>
        {% endif %}
        <div class="mb-3">
            <label class="form-label">Recipe Name</label>
            <input name="recipe_name" required type="text" class="form-control" value="{{ recipe.receipe_name }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Recipe Description</label>
            <textarea class="form-control" name="recipe_description" required>{{ recipe.receipe_description }}</textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Recipe Image</label>
            {% if recipe.receipe_image %}
                <img src="{{ recipe.receipe_image.url }}" width="100" height="80" style="object-fit:cover;">
            {% endif %}
            <input name="recipe_image" type="file" class="form-control mt-2">
        </div>
        <button type="submit" class="btn btn-primary">Update Recipe</button>
        <a href="/" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
